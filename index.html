<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOAI Systems</title>
  <meta name="description" content="DOAI Systems — AI-powered automation for your business." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F916;</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    :root {
      --bg-deep: #050B17;
      --teal: #00C9A7;
      --teal-glow: rgba(0, 201, 167, 0.22);
      --purple: #818CF8;
      --text: #E8EEFF;
      --text-muted: rgba(232, 238, 255, 0.55);
      --text-faint: rgba(232, 238, 255, 0.28);
      --surface: rgba(10, 18, 36, 0.65);
      --border: rgba(255, 255, 255, 0.09);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      height: 100%;
      overflow: hidden;
    }

    /* ---- Full-screen background ---- */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(150deg,
          rgba(5, 11, 23, 0.92) 0%,
          rgba(5, 11, 23, 0.70) 50%,
          rgba(5, 11, 23, 0.90) 100%),
        url('Background.jpg');
      background-size: cover;
      background-position: center 40%;
    }

    /* ---- Page layout ---- */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      padding: 1.5rem;
      gap: 1.5rem;
      opacity: 0;
      animation: fadeIn 1s ease 0.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ---- Logo ---- */
    .logo {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
      flex-shrink: 0;
    }

    .logo .accent {
      background: linear-gradient(90deg, var(--teal), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ---- Chat container ---- */
    .chat-container {
      width: 100%;
      max-width: 680px;
      height: min(560px, calc(100dvh - 140px));
      display: flex;
      flex-direction: column;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 60px rgba(0, 201, 167, 0.08),
        0 0 120px rgba(0, 201, 167, 0.04),
        0 25px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      animation: containerGlow 4s ease-in-out infinite alternate;
    }

    @keyframes containerGlow {
      0%   { box-shadow: 0 0 60px rgba(0,201,167,0.08), 0 0 120px rgba(0,201,167,0.04), 0 25px 60px rgba(0,0,0,0.5); }
      100% { box-shadow: 0 0 80px rgba(0,201,167,0.12), 0 0 160px rgba(0,201,167,0.06), 0 25px 60px rgba(0,0,0,0.5); }
    }

    /* ---- Chat header bar ---- */
    .chat-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 8px var(--teal);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-header-text {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    /* ---- Messages area ---- */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    /* ---- Chat bubbles ---- */
    .message {
      max-width: 82%;
      padding: 0.85rem 1.15rem;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.65;
      opacity: 0;
      transform: translateY(12px);
      animation: msgAppear 0.4s ease forwards;
    }

    .message.bot {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom-left-radius: 4px;
      color: var(--text);
      animation-name: msgSlideLeft;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(0, 201, 167, 0.2), rgba(129, 140, 248, 0.15));
      border: 1px solid rgba(0, 201, 167, 0.25);
      border-bottom-right-radius: 4px;
      color: var(--text);
      animation-name: msgSlideRight;
    }

    @keyframes msgSlideLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes msgSlideRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes msgAppear {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- Typing indicator ---- */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      opacity: 0;
      animation: msgSlideLeft 0.3s ease forwards;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ---- Input area ---- */
    .chat-input-area {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .chat-input::placeholder {
      color: var(--text-faint);
    }

    .chat-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: var(--teal);
      color: var(--bg-deep);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 0 20px var(--teal-glow);
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px var(--teal-glow), 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
    }

    /* ---- Powered by footer ---- */
    .footer-text {
      font-size: 0.7rem;
      color: var(--text-faint);
      text-align: center;
      flex-shrink: 0;
    }

    /* ---- Mobile responsive ---- */
    @media (max-width: 600px) {
      .page {
        padding: 1rem 0.75rem;
        gap: 1rem;
      }

      .chat-container {
        height: min(520px, calc(100dvh - 110px));
        border-radius: 16px;
      }

      .chat-messages {
        padding: 1rem;
      }

      .message {
        max-width: 88%;
        font-size: 0.88rem;
      }

      .chat-input-area {
        padding: 0.75rem;
      }
    }

    @media (max-height: 600px) {
      .chat-container {
        height: calc(100dvh - 100px);
      }
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="page">

    <div class="logo">DOAI <span class="accent">Systems</span></div>

    <div class="chat-container">

      <div class="chat-header">
        <div class="status-dot"></div>
        <span class="chat-header-text">DOAI Assistant</span>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-area">
        <input
          type="text"
          class="chat-input"
          id="chatInput"
          placeholder="Type your message..."
          autocomplete="off"
        />
        <button class="send-btn" id="sendBtn" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

    </div>

    <div class="footer-text">&copy; <span id="year"></span> DOAI Systems</div>

  </div>

  <script>

    document.getElementById('year').textContent = new Date().getFullYear();

    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    const WEBHOOK_URL = 'https://hook.eu2.make.com/bpzpbd9raycpq4cyrref39lm4ecl1m8o';

    let isWaiting = false;

    // ---- Typing animation for bot messages ----
    function typeMessage(element, text, speed = 18) {
      return new Promise(resolve => {
        let i = 0;
        element.textContent = '';
        function type() {
          if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            scrollToBottom();
            setTimeout(type, speed);
          } else {
            resolve();
          }
        }
        type();
      });
    }

    // ---- Add user message ----
    function addUserMessage(text) {
      const msg = document.createElement('div');
      msg.className = 'message user';
      msg.textContent = text;
      chatMessages.appendChild(msg);
      scrollToBottom();
    }

    // ---- Add bot message with typing ----
    async function addBotMessage(text) {
      const msg = document.createElement('div');
      msg.className = 'message bot';
      chatMessages.appendChild(msg);
      scrollToBottom();
      await typeMessage(msg, text);
    }

    // ---- Show typing indicator ----
    function showTypingIndicator() {
      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.id = 'typingIndicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';
      chatMessages.appendChild(indicator);
      scrollToBottom();
    }

    // ---- Remove typing indicator ----
    function removeTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
    }

    // ---- Scroll to bottom ----
    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // ---- Send message to webhook ----
    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || isWaiting) return;

      isWaiting = true;
      sendBtn.disabled = true;
      chatInput.value = '';

      addUserMessage(text);

      showTypingIndicator();

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);

        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: "chris" }),
          signal: controller.signal
        });

        clearTimeout(timeout);

        let reply = '';

        const contentType = response.headers.get('content-type') || '';

        if (contentType.includes('application/json')) {
          const data = await response.json();
          if (typeof data === 'string') {
            reply = data;
          } else if (data.data) {
            reply = data.data;
          } else if (data.message) {
            reply = data.message;
          } else if (data.response) {
            reply = data.response;
          } else if (data.text) {
            reply = data.text;
          } else if (data.reply) {
            reply = data.reply;
          } else {
            reply = JSON.stringify(data);
          }
        } else {
          reply = await response.text();
        }

        if (!reply || reply.trim() === '') {
          reply = "I received your message but didn't get a response. Please try again.";
        }

        removeTypingIndicator();
        await addBotMessage(reply);

      } catch (err) {
        removeTypingIndicator();
        const errorMsg = err.name === 'AbortError'
          ? "Sorry, the request timed out. Please try again."
          : "Sorry, I'm having trouble connecting. Please try again.";
        await addBotMessage(errorMsg);
      }

      isWaiting = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }

    // ---- Event listeners ----
    sendBtn.addEventListener('click', sendMessage);

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ---- Opening message on page load ----
    window.addEventListener('load', () => {
      setTimeout(() => {
        addBotMessage("Welcome to DOAI Systems. Tell me about your business and I'll show you what we can automate.");
      }, 600);
    });

  </script>

</body>
</html>
