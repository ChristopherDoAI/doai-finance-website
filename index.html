<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOAI Systems</title>
  <meta name="description" content="AI automation for your business" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F916;</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    :root {
      --bg-deep: #050B17;
      --accent: #4A6FA5;
      --accent-dim: rgba(74, 111, 165, 0.15);
      --accent-glow: rgba(74, 111, 165, 0.25);
      --text: #E8EEFF;
      --text-muted: rgba(232, 238, 255, 0.6);
      --text-faint: rgba(232, 238, 255, 0.3);
      --surface: rgba(10, 18, 36, 0.7);
      --surface-light: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.09);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* ---- Background ---- */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(150deg,
          rgba(5, 11, 23, 0.93) 0%,
          rgba(5, 11, 23, 0.72) 50%,
          rgba(5, 11, 23, 0.93) 100%),
        url('Background.jpg');
      background-size: cover;
      background-position: center 40%;
    }

    /* ---- Page ---- */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 1.5rem;
      opacity: 0;
      animation: fadeIn 1s ease 0.2s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    /* ---- Logo ---- */
    .logo {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
      flex-shrink: 0;
    }

    .logo .accent {
      color: #5EA4FF;
      text-shadow: 0 0 12px rgba(94, 164, 255, 0.5), 0 0 30px rgba(94, 164, 255, 0.2);
    }

    /* ---- Heimer intro ---- */
    .heimer-intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }

    .heimer-intro .heimer-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #5EA4FF;
      letter-spacing: 0.05em;
      text-shadow: 0 0 10px rgba(94, 164, 255, 0.4);
    }

    .heimer-intro .heimer-avatar-large {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      animation: heimerFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(74, 111, 165, 0.4));
    }

    @keyframes heimerFloat {
      0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 12px rgba(74, 111, 165, 0.4)); }
      50%      { transform: translateY(-5px); filter: drop-shadow(0 0 20px rgba(74, 111, 165, 0.6)); }
    }

    /* ---- Chat container ---- */
    .chat-container {
      width: 100%;
      max-width: 660px;
      height: min(540px, calc(100dvh - 260px));
      display: flex;
      flex-direction: column;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 60px rgba(74, 111, 165, 0.08),
        0 0 120px rgba(74, 111, 165, 0.04),
        0 25px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      animation: containerGlow 4s ease-in-out infinite alternate;
      flex-shrink: 0;
    }

    @keyframes containerGlow {
      0%   { box-shadow: 0 0 60px rgba(74,111,165,0.08), 0 0 120px rgba(74,111,165,0.04), 0 25px 60px rgba(0,0,0,0.5); }
      100% { box-shadow: 0 0 80px rgba(74,111,165,0.13), 0 0 160px rgba(74,111,165,0.06), 0 25px 60px rgba(0,0,0,0.5); }
    }

    /* ---- Messages area ---- */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* ---- Message rows ---- */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
      opacity: 0;
      width: 100%;
    }

    .msg-row.bot {
      justify-content: flex-start;
      animation: msgSlideLeft 0.4s ease forwards;
    }

    .msg-row.user {
      justify-content: flex-end;
      animation: msgSlideRight 0.4s ease forwards;
    }

    .msg-avatar {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid rgba(74, 111, 165, 0.5);
      box-shadow: 0 0 8px rgba(74, 111, 165, 0.3);
    }

    .msg-bubble {
      max-width: 80%;
      padding: 0.85rem 1.15rem;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.65;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .msg-row.bot .msg-bubble {
      background: var(--surface-light);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-left-radius: 4px;
    }

    .msg-row.user .msg-bubble {
      background: linear-gradient(135deg, rgba(74,111,165,0.2), rgba(74,111,165,0.12));
      border: 1px solid rgba(74,111,165,0.25);
      border-bottom-right-radius: 4px;
    }

    @keyframes msgSlideLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes msgSlideRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ---- Typing indicator ---- */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
      align-self: flex-start;
      opacity: 0;
      animation: msgSlideLeft 0.3s ease forwards;
    }

    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 0.85rem 1.15rem;
      background: var(--surface-light);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ---- Input area ---- */
    .chat-input-area {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .chat-input::placeholder { color: var(--text-faint); }
    .chat-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: #5EA4FF;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 0 20px rgba(94, 164, 255, 0.35);
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(94, 164, 255, 0.5), 0 4px 16px rgba(0,0,0,0.3);
    }

    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .send-btn svg { width: 20px; height: 20px; }

    /* ---- Contact form ---- */
    .contact-section {
      width: 100%;
      max-width: 660px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.8s ease, opacity 0.6s ease 0.2s, margin 0.6s ease;
      margin-top: 0;
      flex-shrink: 0;
    }

    .contact-section.visible {
      max-height: 800px;
      opacity: 1;
      margin-top: 1.5rem;
    }

    .contact-form {
      padding: 2rem;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .contact-form h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: var(--text);
      text-align: center;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--text-faint);
    }

    .submit-btn {
      width: 100%;
      padding: 0.85rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #3D5E8C);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 0 20px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px var(--accent-glow), 0 4px 16px rgba(0,0,0,0.3);
    }

    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: var(--bg-deep);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .form-error {
      text-align: center;
      color: #FF6B6B;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }

    .form-error.visible { display: block; }

    /* ---- Confirmation / Calendly ---- */
    .confirmation {
      text-align: center;
      padding: 1.5rem 0;
    }

    .confirmation h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }

    .confirmation p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .calendly-inline-widget {
      border-radius: 12px;
      overflow: hidden;
    }

    /* ---- Choice buttons ---- */
    .choice-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      padding: 0.5rem 0;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    .choice-btn {
      padding: 0.65rem 1.25rem;
      border-radius: 50px;
      border: 1.5px solid #5EA4FF;
      background: transparent;
      color: #5EA4FF;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s, color 0.2s;
    }

    .choice-btn:hover {
      transform: scale(1.05);
      background: rgba(94, 164, 255, 0.1);
      box-shadow: 0 0 18px rgba(94, 164, 255, 0.3);
    }

    .choice-btn:active {
      transform: scale(0.97);
    }

    /* ---- Input locked state ---- */
    .chat-input-area.locked {
      opacity: 0.3;
      pointer-events: none;
    }

    .chat-input-area.dimmed {
      opacity: 0.5;
    }

    .chat-input-area.dimmed .chat-input {
      transition: opacity 0.3s;
    }

    @media (max-width: 600px) {
      .choice-buttons {
        flex-direction: column;
        align-items: center;
      }

      .choice-btn {
        width: 100%;
        max-width: 280px;
        text-align: center;
      }
    }

    /* ---- Footer ---- */
    .footer-text {
      font-size: 0.7rem;
      color: var(--text-faint);
      text-align: center;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }

    /* ---- Mobile ---- */
    @media (max-width: 600px) {
      .page { padding: 1rem 0.75rem; }

      .logo { margin-top: 1rem; margin-bottom: 1rem; }

      .chat-container {
        height: min(480px, calc(100dvh - 230px));
        border-radius: 16px;
      }

      .chat-messages { padding: 1rem; }

      .msg-bubble {
        max-width: 85%;
        font-size: 0.88rem;
      }

      .msg-avatar { width: 30px; height: 30px; border-width: 1px; }

      .chat-input-area { padding: 0.75rem; }

      .contact-form { padding: 1.25rem; }

      .contact-section.visible { max-height: 1000px; }
    }

    @media (max-height: 600px) {
      .chat-container { height: calc(100dvh - 220px); }
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="page">

    <div class="logo">DOAI <span class="accent">Systems</span></div>

    <!-- Heimer intro avatar -->
    <div class="heimer-intro">
      <img src="heimer-avatar.png" alt="Heimer avatar" class="heimer-avatar-large" />
      <span class="heimer-name">Heimer</span>
    </div>

    <!-- Chat -->
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="Type your message..."
          autocomplete="off"
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <!-- Contact form (hidden until QUALIFY_COMPLETE) -->
    <div class="contact-section" id="contactSection">
      <div class="contact-form" id="contactFormWrapper">
        <h2>Almost there! Fill in your details and let's get started.</h2>
        <form id="contactForm" novalidate>
          <div class="form-group">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" name="fullName" required placeholder="Your full name" />
          </div>
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required placeholder="you@company.com" />
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Optional" />
          </div>
          <div class="form-group">
            <label for="company">Company Name *</label>
            <input type="text" id="company" name="company" required placeholder="Your company" />
          </div>
          <div class="form-group">
            <label for="needs">Your Needs</label>
            <textarea id="needs" name="needs" placeholder="Tell us about your needs..."></textarea>
          </div>
          <input type="hidden" id="hiddenCategory" name="category" />
          <input type="hidden" id="hiddenSessionId" name="sessionId" />
          <input type="hidden" id="hiddenHistory" name="conversationHistory" />
          <button type="submit" class="submit-btn" id="submitBtn">Book a Discovery Call</button>
          <div class="form-error" id="formError">Something went wrong. Please try again.</div>
        </form>
      </div>
    </div>

    <div class="footer-text">&copy; <span id="year"></span> DOAI Systems</div>

  </div>

  <script>
    /* ---- Init ---- */
    document.getElementById('year').textContent = new Date().getFullYear();

    const sessionId = crypto.randomUUID();
    const conversationHistory = [];
    let threadId = null;
    const CHAT_WEBHOOK = 'https://hook.eu2.make.com/bpzpbd9raycpq4cyrref39lm4ecl1m8o';
    const FORM_WEBHOOK = 'https://hook.eu2.make.com/xp1ebxfakuig5p5r730e8k36oukw5ugx';

    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    let isWaiting = false;
    let dynamicButtonsActive = false;
    const defaultPlaceholder = 'Type your message...';
    const buttonsPlaceholder = 'Choose an option above or type your own response';

    /* ---- Small Heimer avatar for messages ---- */
    function heimerSmallHTML() {
      return '<img src="heimer-avatar.png" alt="Heimer" class="msg-avatar" />';
    }

    /* ---- Sanitise HTML to prevent XSS ---- */
    function sanitise(str) {
      const el = document.createElement('div');
      el.textContent = str;
      return el.innerHTML;
    }

    /* ---- Scroll to bottom ---- */
    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    /* ---- Typing animation ---- */
    function typeText(element, text, speed) {
      return new Promise(resolve => {
        let i = 0;
        speed = speed || 16;
        element.textContent = '';
        function tick() {
          if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            scrollToBottom();
            setTimeout(tick, speed);
          } else {
            resolve();
          }
        }
        tick();
      });
    }

    /* ---- Add bot message ---- */
    async function addBotMessage(text, animate, addToHistory) {
      if (animate === undefined) animate = true;
      if (addToHistory === undefined) addToHistory = true;
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      row.innerHTML = heimerSmallHTML();
      row.appendChild(bubble);
      chatMessages.appendChild(row);
      scrollToBottom();

      if (animate) {
        await typeText(bubble, text);
      } else {
        bubble.textContent = text;
      }

      if (addToHistory) {
        conversationHistory.push({ role: 'assistant', content: text });
      }
      scrollToBottom();
    }

    /* ---- Show choice buttons ---- */
    function showChoiceButtons() {
      const container = document.createElement('div');
      container.className = 'choice-buttons';
      container.id = 'choiceButtons';

      const btn1 = document.createElement('button');
      btn1.className = 'choice-btn';
      btn1.textContent = 'Use AI in my business';
      btn1.addEventListener('click', function() { handleChoice("I'm looking to use AI automation in my business"); });

      const btn2 = document.createElement('button');
      btn2.className = 'choice-btn';
      btn2.textContent = 'Explore a partnership';
      btn2.addEventListener('click', function() { handleChoice("I'm looking for a partnership opportunity"); });

      container.appendChild(btn1);
      container.appendChild(btn2);
      chatMessages.appendChild(container);
      scrollToBottom();
    }

    /* ---- Handle choice button click ---- */
    async function handleChoice(text) {
      /* Hide buttons */
      const btns = document.getElementById('choiceButtons');
      if (btns) btns.remove();

      /* Show user message */
      addUserMessage(text);
      showTypingIndicator();

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);

        const res = await fetch(CHAT_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            sessionId: sessionId,
            threadId: threadId
          }),
          signal: controller.signal
        });

        clearTimeout(timeout);

        const contentType = res.headers.get('content-type') || '';
        let rawReply = '';

        var resText = await res.text();
        rawReply = parseResponse(resText, contentType);

        if (!rawReply || rawReply.trim() === '') {
          rawReply = "I received your message but didn't get a response. Please try again.";
        }

        removeTypingIndicator();
        await processAndDisplayReply(rawReply);

      } catch (err) {
        removeTypingIndicator();
        await addBotMessage("Sorry, I'm having a moment! Please try again.");
      }

      /* Unlock the input area */
      document.querySelector('.chat-input-area').classList.remove('locked');
      chatInput.focus();
    }

    /* ---- Add user message ---- */
    function addUserMessage(text) {
      const row = document.createElement('div');
      row.className = 'msg-row user';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      row.appendChild(bubble);
      chatMessages.appendChild(row);
      scrollToBottom();

      conversationHistory.push({ role: 'user', content: text });
    }

    /* ---- Typing indicator ---- */
    function showTypingIndicator() {
      const row = document.createElement('div');
      row.className = 'typing-row';
      row.id = 'typingIndicator';
      row.innerHTML = heimerSmallHTML() + '<div class="typing-dots"><span></span><span></span><span></span></div>';
      chatMessages.appendChild(row);
      scrollToBottom();
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    /* ---- Button detection in responses ---- */
    function checkForButtons(text) {
      var match = text.match(/\[BUTTONS:\s*(.*?)\]/i);
      if (match) {
        var labels = match[1].split('|').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
        var cleanText = text.replace(/\[BUTTONS:\s*.*?\]/i, '').trim();
        return { found: true, labels: labels, displayText: cleanText };
      }
      return { found: false, displayText: text };
    }

    function showDynamicButtons(labels) {
      var container = document.createElement('div');
      container.className = 'choice-buttons';
      container.id = 'dynamicButtons';

      labels.forEach(function(label) {
        var btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = label;
        btn.addEventListener('click', function() { handleDynamicChoice(label); });
        container.appendChild(btn);
      });

      chatMessages.appendChild(container);
      scrollToBottom();

      dynamicButtonsActive = true;
      chatInput.placeholder = buttonsPlaceholder;
      document.querySelector('.chat-input-area').classList.add('dimmed');
    }

    function removeDynamicButtons() {
      var el = document.getElementById('dynamicButtons');
      if (el) el.remove();
      dynamicButtonsActive = false;
      chatInput.placeholder = defaultPlaceholder;
      document.querySelector('.chat-input-area').classList.remove('dimmed');
    }

    async function handleDynamicChoice(text) {
      removeDynamicButtons();
      addUserMessage(text);
      showTypingIndicator();
      isWaiting = true;
      sendBtn.disabled = true;

      try {
        var controller = new AbortController();
        var timeout = setTimeout(function() { controller.abort(); }, 10000);

        var res = await fetch(CHAT_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            sessionId: sessionId,
            threadId: threadId
          }),
          signal: controller.signal
        });

        clearTimeout(timeout);

        var contentType = res.headers.get('content-type') || '';
        var resText = await res.text();
        var rawReply = parseResponse(resText, contentType);

        if (!rawReply || rawReply.trim() === '') {
          rawReply = "I received your message but didn't get a response. Please try again.";
        }

        removeTypingIndicator();
        await processAndDisplayReply(rawReply);

      } catch (err) {
        removeTypingIndicator();
        await addBotMessage("Sorry, I'm having a moment! Please try again.");
      }

      isWaiting = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }

    /* ---- Process bot reply: QUALIFY_COMPLETE + buttons ---- */
    async function processAndDisplayReply(rawReply) {
      var qc = checkQualifyComplete(rawReply);
      var bc = checkForButtons(qc.displayText);

      await addBotMessage(sanitise(bc.displayText));

      if (bc.found) {
        showDynamicButtons(bc.labels);
      }

      if (qc.found) {
        showContactForm(qc.category, qc.summary);
      }
    }

    /* ---- QUALIFY_COMPLETE detection ---- */
    function checkQualifyComplete(rawText) {
      const match = rawText.match(/QUALIFY_COMPLETE:\s*(\w+)\s*\|\s*([\s\S]*?)$/i);
      if (match) {
        const category = match[1].trim();
        const summary = match[2].trim();
        const cleanText = rawText.replace(/QUALIFY_COMPLETE:[\s\S]*$/i, '').trim();
        return { found: true, category: category, summary: summary, displayText: cleanText };
      }
      return { found: false, displayText: rawText };
    }

    function showContactForm(category, summary) {
      document.getElementById('hiddenCategory').value = category;
      document.getElementById('hiddenSessionId').value = sessionId;
      document.getElementById('hiddenHistory').value = JSON.stringify(conversationHistory);
      document.getElementById('needs').value = summary;

      const section = document.getElementById('contactSection');
      section.classList.add('visible');

      setTimeout(() => {
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 400);
    }

    /* ---- Parse webhook response ---- */
    function extractReply(obj) {
      if (obj.threadId) {
        threadId = obj.threadId;
      }
      if (obj.reply) return obj.reply;
      if (obj.choices && obj.choices[0] && obj.choices[0].message && obj.choices[0].message.content) {
        return obj.choices[0].message.content;
      }
      if (obj.data) return typeof obj.data === 'string' ? obj.data : JSON.stringify(obj.data);
      if (obj.response) return typeof obj.response === 'string' ? obj.response : JSON.stringify(obj.response);
      if (obj.message) return typeof obj.message === 'string' ? obj.message : JSON.stringify(obj.message);
      if (obj.text) return obj.text;
      return null;
    }

    function parseResponse(data, contentType) {
      /* If data is a string, try parsing as JSON first */
      if (typeof data === 'string') {
        try {
          var parsed = JSON.parse(data);
          var reply = extractReply(parsed);
          if (reply) return reply;
          return data;
        } catch (e) {
          return data;
        }
      }

      /* Already an object */
      var reply = extractReply(data);
      if (reply) return reply;
      return JSON.stringify(data);
    }

    /* ---- Send message ---- */
    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || isWaiting) return;

      /* Dismiss dynamic buttons if user types instead */
      if (dynamicButtonsActive) {
        removeDynamicButtons();
      }

      isWaiting = true;
      sendBtn.disabled = true;
      chatInput.value = '';
      chatInput.style.height = 'auto';

      addUserMessage(text);
      showTypingIndicator();

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);

        const res = await fetch(CHAT_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            sessionId: sessionId,
            threadId: threadId
          }),
          signal: controller.signal
        });

        clearTimeout(timeout);

        const contentType = res.headers.get('content-type') || '';
        let rawReply = '';

        var resText = await res.text();
        rawReply = parseResponse(resText, contentType);

        if (!rawReply || rawReply.trim() === '') {
          rawReply = "I received your message but didn't get a response. Please try again.";
        }

        removeTypingIndicator();
        await processAndDisplayReply(rawReply);

      } catch (err) {
        removeTypingIndicator();
        await addBotMessage("Sorry, I'm having a moment! Please try again.");
      }

      isWaiting = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }

    /* ---- Auto-resize textarea ---- */
    chatInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    /* ---- Event listeners ---- */
    sendBtn.addEventListener('click', sendMessage);

    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    /* ---- Contact form submission ---- */
    document.getElementById('contactForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const form = e.target;
      const submitBtn = document.getElementById('submitBtn');
      const errorEl = document.getElementById('formError');
      errorEl.classList.remove('visible');

      /* Basic validation */
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const company = document.getElementById('company').value.trim();

      if (!fullName || !email || !company) {
        errorEl.textContent = 'Please fill in all required fields.';
        errorEl.classList.add('visible');
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.textContent = 'Please enter a valid email address.';
        errorEl.classList.add('visible');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="spinner"></div> Submitting...';

      try {
        const payload = {
          fullName: fullName,
          email: email,
          phone: document.getElementById('phone').value.trim(),
          company: company,
          needs: document.getElementById('needs').value.trim(),
          category: document.getElementById('hiddenCategory').value,
          sessionId: document.getElementById('hiddenSessionId').value,
          conversationHistory: document.getElementById('hiddenHistory').value
        };

        const res = await fetch(FORM_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('Submit failed');

        /* Replace form with confirmation + Calendly */
        document.getElementById('contactFormWrapper').innerHTML = `
          <div class="confirmation">
            <h3>Thanks! We've got your details.</h3>
            <p>Book a time for your discovery call below:</p>
            <div class="calendly-inline-widget" data-url="https://calendly.com/christopher-do-doaifinance/30min" style="min-width:300px;height:500px;"></div>
          </div>
        `;

        /* Load Calendly widget script */
        const script = document.createElement('script');
        script.src = 'https://assets.calendly.com/assets/external/widget.js';
        script.async = true;
        document.body.appendChild(script);

      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Book a Discovery Call';
        errorEl.textContent = 'Something went wrong. Please try again.';
        errorEl.classList.add('visible');
      }
    });

    /* ---- Lock input on load ---- */
    document.querySelector('.chat-input-area').classList.add('locked');

    /* ---- Opening message ---- */
    window.addEventListener('load', function() {
      setTimeout(function() {
        showTypingIndicator();
        setTimeout(async function() {
          removeTypingIndicator();
          await addBotMessage("Hey there! I'm Heimer, DOAI Systems' AI assistant. I'm here to help you figure out how AI automation can work for your business.", true, false);
          showChoiceButtons();
        }, 1200);
      }, 600);
    });

  </script>

</body>
